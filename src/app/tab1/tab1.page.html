<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Fictional-Store
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tab 1</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card class="card" *ngIf="products.length > 0">

    <ion-img [src]="products[currentIndex].image" [alt]="products[currentIndex].title"></ion-img>

    <ion-card-header>

      <ion-card-title>{{ products[currentIndex].title }}</ion-card-title>
      <ion-card-subtitle>U$ {{ products[currentIndex].price }}</ion-card-subtitle>
      
    </ion-card-header>
      
        <ion-accordion-group>
          <ion-accordion value="description">
            <ion-item slot="header" color="light">
            <ion-label>Ver descrição do produto</ion-label>
            </ion-item>
            <div class="ion-padding" slot="content">
            {{ products[currentIndex].description }}
            </div>
          </ion-accordion>
        </ion-accordion-group>


  </ion-card>

<ion-row class="ion-justify-content-between">

      <ion-button shape="round" fill="solid" color="danger" class="prev" (click)="prevProduct()" [disabled]="currentIndex === 0"> 
        Prev 
      </ion-button>
      
      <ion-button shape="round" fill="solid" color="danger" class="next" (click)="nextProduct()" [disabled]="currentIndex === products.length - 1"> 
        Next 
      </ion-button>

    </ion-row>

  <div *ngIf="products.length === 0" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>

    <p><strong>Carregando produtos</strong></p>
  </div>
  
</ion-content>
